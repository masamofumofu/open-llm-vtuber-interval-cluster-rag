<text x="130" y="344.0" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">rag_interval_cluster/docs/</text>
<text x="130" y="365.6" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">conf.yaml / logs / md等</text>
