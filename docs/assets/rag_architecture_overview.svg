<text x="130" y="509.0" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">document_loader.py</text>
<text x="130" y="530.6" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">chunker.py</text>
<text x="130" y="552.2" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">YAML構造を考慮</text>
