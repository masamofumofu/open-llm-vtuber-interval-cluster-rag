  <rect x="0" y="0" width="1280" height="900" fill="#f7f9fb"/>
  <text x="640.0" y="48" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#1f2d3d" text-anchor="middle">
    Hierarchical Interval Cluster RAG for Open-LLM-VTuber
  </text>
  <text x="640.0" y="82" font-family="Arial, sans-serif" font-size="17" fill="#52616f" text-anchor="middle">
    RAG対象質問だけ通常LLMをスキップし、根拠付き回答を画面表示、短文だけをMioTTSへ送る構成
  </text>

  <g filter="url(#shadow)">
    <rect x="25.0" y="124.0" width="210" height="92" rx="14" fill="#e8f4ff" stroke="#34495e" stroke-width="2"/>
<text x="130" y="156.0" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1f2d3d" text-anchor="middle">ユーザー入力</text>
<text x="130" y="188.0" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">text-input / 音声入力</text>
<text x="130" y="209.6" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">例: conf.yaml設定確認</text>
    <rect x="265.0" y="124.0" width="230" height="92" rx="14" fill="#fff5db" stroke="#34495e" stroke-width="2"/>
<text x="380" y="156.0" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1f2d3d" text-anchor="middle">RAG使用判定</text>
<text x="380" y="188.0" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">rag_gate.py</text>
<text x="380" y="209.6" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">通常会話か根拠参照か判定</text>
    <rect x="535.0" y="124.0" width="230" height="92" rx="14" fill="#e8ffe8" stroke="#34495e" stroke-width="2"/>
<text x="650" y="156.0" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1f2d3d" text-anchor="middle">通常会話</text>
<text x="650" y="188.0" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">agent_engine.chat()</text>
<text x="650" y="209.6" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">従来LLM + MioTTS</text>
