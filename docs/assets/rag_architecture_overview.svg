<text x="380" y="677.0" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1f2d3d" text-anchor="middle">Open-LLM-VTuber表示</text>
<text x="380" y="709.0" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">full-textで全文表示</text>
<text x="380" y="730.6" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">短文音声payload送信</text>
