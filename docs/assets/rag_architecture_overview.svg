<text x="380" y="509.0" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">embedder_tfidf.py</text>
<text x="380" y="530.6" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">TF-IDF char n-gram</text>
