<text x="650" y="709.0" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">rag_tts_text.py</text>
<text x="650" y="730.6" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">全文は読まない</text>
<text x="650" y="752.2" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">40字程度の1文</text>
