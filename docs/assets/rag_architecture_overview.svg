<text x="930" y="509.0" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">hierarchical_cluster.py</text>
<text x="930" y="530.6" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">代表チャンク選択</text>
