<text x="650" y="339.0" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">chat_with_optional_rag()</text>
<text x="650" y="360.6" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" text-anchor="middle">通常LLMをスキップ</text>
